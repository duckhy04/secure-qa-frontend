<!-- <p>login works!</p> -->
<div class="flex justify-center items-center bg-white p-2 rounded-lg shadow-lg">
    <div class="flex flex-col justify-center items-center gap-4 px-16 py-32 border-r-2">
        <h1 class="h1">Login</h1>
        <div class="flex gap-2">
            <app-button label="Google"></app-button>
            <app-button label="Facebook"></app-button>
        </div>
        <span>You do not have an account? <a class="a-auth" routerLink="/auth/sign-up">Sign up</a></span>
    </div>

    <div class="pl-4 w-72">
        <form [formGroup]="loginForm" (ngSubmit)="login()">

            <!-- Username -->
            <div class="form-group">
                <div class="form-icon-label">
                    <span class="material-symbols-outlined icon icon-badge">
                        badge
                    </span>
                    <label class="form-label" for="username">Username</label>
                </div>

                <input class="form-input" formControlName="username" id="username" type="text" placeholder="Username">
                <div class="form-input-required"
                    *ngIf="loginForm.get('username')!.invalid && loginForm.get('username')!.touched">
                    Username is required.
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <div class="form-icon-label">
                    <span class="material-symbols-outlined icon icon-lock">
                        lock
                    </span>
                    <label class="form-label" for="password">Password</label>
                </div>

                <input class="form-input" formControlName="password" id="password" type="password"
                    placeholder="Password">

                <div class="form-input-required max-w-72"
                    *ngIf="loginForm.get('password')!.invalid && loginForm.get('password')!.touched">
                    <div *ngIf="loginForm.get('password')!.hasError('required')">
                        Password is required.
                    </div>

                    <div *ngIf="loginForm.get('password')!.hasError('minlength')">
                        Password must be at least 8 characters long.
                    </div>

                    <div *ngIf="loginForm.get('password')!.hasError('pattern')">
                        <p>Password must contain at least one uppercase letter, one lowercase letter, and one number.</p>
                    </div>
                </div>

            </div>

            <div class="flex justify-center">
                <app-button label="Login" type="submit" [disabled]="loginForm.invalid"></app-button>
            </div>

            <div *ngIf="loginError" class="form-input-required">
                {{loginError}}
            </div>
        </form>
    </div>
</div>
